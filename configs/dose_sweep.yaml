# Main benchmark: all methods across the full dose range on both lattices.
# Classical methods are tuned per (preset, dose) on separate tuning fields;
# the CNNs use one fixed checkpoint across every condition.
name: dose_sweep
seed: 42
presets: [hexagonal, binary_square]
doses: [2, 5, 10, 20, 50, 150, 500]
n_eval_fields: 6
n_tune_fields: 2
field_size: 256
tolerance_px: 3.0
methods:
  - {name: raw}
  - {name: gaussian, tune: true}
  - {name: nlm, tune: true}
  - {name: wavelet, tune: true}
  - {name: cnn_supervised, checkpoint: models/unet_supervised.pt}
  - {name: cnn_n2n, checkpoint: models/unet_n2n.pt}
